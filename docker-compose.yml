version: '3.8'
services:
  webserver:
    image: nginx:alpine
    container_name: foundify-webserver
    ports:
      - "8092:80"
      - "4433:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - php
      - mysql
    networks:
      - foundify-network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: foundify-php
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini  # Mount custom php.ini
    networks:
      - foundify-network
    environment:
      - PHP_MEMORY_LIMIT=512M
      - PHP_MAX_EXECUTION_TIME=300
      - UPLOAD_MAX_FILESIZE=20M
      - POST_MAX_SIZE=20M

  mysql:
    image: mysql:8.0
    container_name: foundify-mysql
    ports:
      - "33070:3306"
    environment:
      MYSQL_DATABASE: lostfoundDB
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: laravel
    volumes:
      - foundify-mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf  # Mount custom MySQL config
    networks:
      - foundify-network
    command: --default-authentication-plugin=mysql_native_password --max_allowed_packet=32M

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: foundify-phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - foundify-network

  redis:
    image: redis:alpine
    container_name: foundify-redis
    ports:
      - "6380:6379"
    networks:
      - foundify-network

networks:
  foundify-network:
    driver: bridge

volumes:
  foundify-mysql-data: